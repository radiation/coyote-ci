services:
  db:
    image: postgres:17
    container_name: coyote-ci-db
    environment:
      POSTGRES_DB: coyote_ci
      POSTGRES_USER: coyote
      POSTGRES_PASSWORD: coyote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coyote -d coyote_ci"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: golang:${GO_VERSION:-1.26.2}
    container_name: coyote-ci-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: coyote
      DB_PASSWORD: coyote
      DB_NAME: coyote_ci
      DB_SSLMODE: disable
      DATABASE_URL: postgres://coyote:coyote@db:5432/coyote_ci?sslmode=disable
      GOOSE_MIGRATION_DIR: /migrations
    volumes:
      - ./backend/db/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - 'go run github.com/pressly/goose/v3/cmd/goose@v3.24.1 -dir "$${GOOSE_MIGRATION_DIR}" postgres "$${DATABASE_URL}" up'
    restart: "no"

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
      args:
        GO_VERSION: ${GO_VERSION:-1.26.2}
    container_name: coyote-ci-server
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_PORT: "8080"
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_WRITE_TOKEN: ${GITHUB_WRITE_TOKEN}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: coyote
      DB_PASSWORD: coyote
      DB_NAME: coyote_ci
      DB_SSLMODE: disable
      ARTIFACT_STORAGE_ROOT: /var/lib/coyote-artifacts
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      - artifact_data:/var/lib/coyote-artifacts

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.26.2}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: coyote
      DB_PASSWORD: coyote
      DB_NAME: coyote_ci
      DB_SSLMODE: disable
      ARTIFACT_STORAGE_ROOT: /var/lib/coyote-artifacts
      WORKER_EXECUTION_WORKSPACE_ROOT: /tmp/coyote-builds
      WORKER_MOUNT_DOCKER_SOCKET: "true"
    entrypoint: ["/app/worker"]
    volumes:
      - artifact_data:/var/lib/coyote-artifacts
      # Local-dev only: mounting the host Docker socket grants root-equivalent host access.
      # Do not use this pattern in less-trusted or shared environments.
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/coyote-builds:/tmp/coyote-builds

  frontend:
    image: node:22-alpine
    container_name: coyote-ci-frontend
    working_dir: /app
    depends_on:
      - server
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://server:8080

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
  frontend_node_modules:
  artifact_data:
