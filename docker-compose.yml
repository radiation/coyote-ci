services:
  db:
    image: postgres:17
    container_name: coyote-ci-db
    environment:
      POSTGRES_DB: coyote_ci
      POSTGRES_USER: coyote
      POSTGRES_PASSWORD: coyote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coyote -d coyote_ci"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:17
    container_name: coyote-ci-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: coyote
      DB_PASSWORD: coyote
      DB_NAME: coyote_ci
      DB_SSLMODE: disable
    volumes:
      - ./backend/db/init:/migrations:ro
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - 'for f in /migrations/*.sql; do echo "applying migration: $$f"; PGPASSWORD="$${DB_PASSWORD}" psql "postgresql://$${DB_USER}@$${DB_HOST}:$${DB_PORT}/$${DB_NAME}?sslmode=$${DB_SSLMODE}" -v ON_ERROR_STOP=1 -f "$$f"; done'
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coyote-ci-backend
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: coyote
      DB_PASSWORD: coyote
      DB_NAME: coyote_ci
      DB_SSLMODE: disable
    ports:
      - "8080:8080"

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: coyote-ci-backend-dev
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: coyote
      DB_PASSWORD: coyote
      DB_NAME: coyote_ci
      DB_SSLMODE: disable
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    profiles:
      - dev
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coyote-ci-worker
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: coyote
      DB_PASSWORD: coyote
      DB_NAME: coyote_ci
      DB_SSLMODE: disable
    entrypoint: ["/app/worker"]

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
