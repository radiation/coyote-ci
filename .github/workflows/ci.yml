name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/codeql.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'
            mcp:
              - 'mcp/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend CI
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Verify formatting
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "These files need formatting:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Build coverage HTML
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: |
            backend/coverage.out
            backend/coverage.html

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: backend

  ci-summary:
    name: CI Summary
    needs:
      - changes
      - backend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required module jobs passed or were not needed
        run: |
          echo "backend changed: ${{ needs.changes.outputs.backend }}"

          if [ "${{ needs.changes.outputs.backend }}" = "true" ] && [ "${{ needs.backend.result }}" != "success" ]; then
            echo "Backend CI failed"
            exit 1
          fi

          echo "All required CI checks passed"
