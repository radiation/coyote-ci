version: 1
pipeline:
  name: coyote-ci
  image: golang@sha256:1e598ea5752ae26c093b746fd73c5095af97d6f2d679c43e83e0eac484a33dc3
  cache:
    preset: go
    policy: pull-push
steps:
  - group:
      name: Bootstrap
      steps:
        - name: Backend Format Check
          run: test -z "$(gofmt -l .)"
          working_dir: backend
          timeout_seconds: 300
        - name: Frontend Install
          run: npm ci
          working_dir: frontend
          image: node@sha256:8ea2348b068a9544dae7317b4f3aafcdc032df1647bb7d768a05a5cad1a7683f
          timeout_seconds: 600
        - name: Backend Dependencies
          run: go mod download
          working_dir: backend
          timeout_seconds: 600
  - group:
      name: Verify
      steps:
        - name: Backend Vet
          run: go vet ./...
          working_dir: backend
          timeout_seconds: 300
        - name: Backend Test
          run: go test ./...
          working_dir: backend
          timeout_seconds: 600
        - name: Frontend Test
          run: npm test
          working_dir: frontend
          image: node@sha256:8ea2348b068a9544dae7317b4f3aafcdc032df1647bb7d768a05a5cad1a7683f
          timeout_seconds: 600
  - group:
      name: Build
      steps:
        - name: Backend Build Server
          run: go build -o dist/coyote-server ./cmd/server
          working_dir: backend
          timeout_seconds: 300
        - name: Backend Build Worker
          run: go build -o dist/coyote-worker ./cmd/worker
          working_dir: backend
          timeout_seconds: 300
        - name: Frontend Build
          run: npm run build
          working_dir: frontend
          image: node@sha256:8ea2348b068a9544dae7317b4f3aafcdc032df1647bb7d768a05a5cad1a7683f
          timeout_seconds: 600
  - group:
      name: Images
      steps:
        - name: Backend Image
          run: docker build --build-arg GO_VERSION=1.26.2 -t coyote-ci/backend:latest -f backend/Dockerfile backend
          image: docker@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
          timeout_seconds: 600
        - name: Frontend Image
          run: docker build -t coyote-ci/frontend:latest -f frontend/Dockerfile frontend
          image: docker@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
          timeout_seconds: 600
artifacts:
  - backend/dist/coyote-server
  - backend/dist/coyote-worker
  - frontend/dist/**
