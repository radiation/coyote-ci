version: 1

pipeline:
  name: coyote-ci

steps:
  - name: Backend Format Check
    run: test -z "$(gofmt -l .)"
    working_dir: backend
    timeout_seconds: 300

  - name: Backend Vet
    run: go vet ./...
    working_dir: backend
    timeout_seconds: 300

  - name: Backend Test
    run: go test ./...
    working_dir: backend
    timeout_seconds: 600

  - name: Backend Build Server
    run: go build -o /tmp/coyote-server ./cmd/server
    working_dir: backend
    timeout_seconds: 300

  - name: Backend Build Worker
    run: go build -o /tmp/coyote-worker ./cmd/worker
    working_dir: backend
    timeout_seconds: 300

  - name: Frontend Install
    run: npm ci
    working_dir: frontend
    timeout_seconds: 600

  - name: Frontend Test
    run: npm test
    working_dir: frontend
    timeout_seconds: 600

  - name: Frontend Build
    run: npm run build
    working_dir: frontend
    timeout_seconds: 600
